name: Daily News Digest (Manual Build Check)

on:
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note for the run summary"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build site from committed content
        run: node scripts/build.mjs
        env:
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
          CUSTOM_DOMAIN: ${{ vars.CUSTOM_DOMAIN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}

      - name: Summary
        run: |
          echo "## Daily Digest Workflow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This repository now generates digests on the always-on Windows mini PC via Task Scheduler and \`scripts/run-daily-news.ps1\`." >> $GITHUB_STEP_SUMMARY
          echo "This manual workflow only verifies that the site still builds from the content already committed to the repository." >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ inputs.note }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- Note: ${{ inputs.note }}" >> $GITHUB_STEP_SUMMARY
          fi
