<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found - Kol's Korner</title>
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">
    <link rel="stylesheet" href="./styles.css">
    <style>
        .error-page { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; padding: 2rem; }
        .error-code { font-size: 6rem; font-weight: 800; opacity: 0.15; line-height: 1; }
        .error-title { font-size: 1.5rem; font-weight: 600; margin-top: 1rem; }
        .error-text { max-width: 28rem; margin-top: 0.75rem; font-size: 0.95rem; opacity: 0.7; line-height: 1.7; }
        .error-link { display: inline-flex; margin-top: 1.5rem; padding: 0.6rem 1.5rem; border-radius: 999px; font-weight: 600; font-size: 0.9rem; text-decoration: none; background: var(--color-primary, #d97706); color: #fff; }
    </style>
</head>
<body>
    <main class="error-page">
        <div class="error-code">404</div>
        <h1 class="error-title">Page not found</h1>
        <p class="error-text">The page you're looking for doesn't exist or has been moved. Try the homepage or browse the latest posts.</p>
        <a href="./" class="error-link">Back to Kol's Korner</a>
    </main>
</body>
</html>
